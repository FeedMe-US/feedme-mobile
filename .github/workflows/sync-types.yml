name: Sync API Types

on:
  repository_dispatch:
    types: [api-types-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest OpenAPI spec
        run: |
          curl -o shared/openapi.json \
            https://raw.githubusercontent.com/FeedMe-US/feedme-docs/main/api/openapi.json

      - name: Generate TypeScript types
        run: npx openapi-typescript shared/openapi.json --output src/types/api.generated.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/types/api.generated.ts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR if changed
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync API types from feedme-docs'
          title: 'chore: sync API types'
          body: |
            Automated PR to sync TypeScript types from feedme-docs.

            Triggered by: ${{ github.event_name }}
          branch: chore/sync-api-types
          delete-branch: true
