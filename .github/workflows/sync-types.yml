name: Sync API Types

on:
  repository_dispatch:
    types: [api-types-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_READ_TOKEN }}

      - name: Checkout feedme-docs
        uses: actions/checkout@v4
        with:
          repository: FeedMe-US/feedme-docs
          token: ${{ secrets.DOCS_READ_TOKEN }}
          path: docs-repo

      - name: Copy OpenAPI spec
        run: |
          mkdir -p shared
          cp docs-repo/api/openapi.json shared/openapi.json
          rm -rf docs-repo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate TypeScript types
        run: npx openapi-typescript shared/openapi.json --output src/types/api.generated.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/types/api.generated.ts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR if changed
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and push branch
          git checkout -b chore/sync-api-types
          git add shared/openapi.json src/types/api.generated.ts
          git commit -m "chore: sync API types from feedme-docs"
          git push -f origin chore/sync-api-types

          # Create PR using gh cli
          gh pr create \
            --title "chore: sync API types" \
            --body "Automated PR to sync TypeScript types from feedme-docs.

          Triggered by: ${{ github.event_name }}" \
            --base main \
            --head chore/sync-api-types || echo "PR already exists or creation failed"
